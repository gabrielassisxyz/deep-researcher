name: ci

on:
  push:
    branches: [master]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0   # gitleaks scans history, not just the tip

      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: shellcheck
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
          shellcheck scripts/deep-research-* scripts/setup scripts/detect-reviewers \
                     scripts/install-firecrawl scripts/review-panel

      - name: consensus tests
        run: |
          # The runner image ships Python without pytest, so the test step had
          # never once executed here — it failed on import in every run.
          python3 -m pip install --quiet pytest
          python3 -m pytest tests/ -q

  # The PR title and body never touch the git tree, so the same gate runs over them here.
  slop-guard-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - env:
          TITLE: ${{ github.event.pull_request.title }}
          BODY: ${{ github.event.pull_request.body }}
        run: |
          printf '%s\n%s\n' "$TITLE" "$BODY" | bin/slop-guard --stdin "PR text"
