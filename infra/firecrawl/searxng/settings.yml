use_default_settings: true

server:
  secret_key: "__SEARXNG_SECRET__"  # generated by scripts/install-firecrawl
  bind_address: "0.0.0.0"
  port: 4080

search:
  formats:
    - html
    - json

engines:
  - name: google
    engine: google
    disabled: false
  - name: bing
    engine: bing
    disabled: false
  - name: duckduckgo
    engine: duckduckgo
    disabled: false
  - name: wikipedia
    engine: wikipedia
    disabled: false
